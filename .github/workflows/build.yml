name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  motional-clients:
    name: motional-clients (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: apps/motional-lock

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - if: runner.os == 'Linux'
        run: cargo install cargo-audit --version 0.22.1 --locked
      - if: runner.os == 'Linux'
        run: cargo audit
      - if: runner.os == 'Linux'
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - if: runner.os == 'Linux'
        run: |
          "$(go env GOPATH)/bin/gitleaks" detect --source ../.. --no-git --redact --verbose
      - run: cargo test --locked
      - run: cargo build --release --locked --bins
      - if: runner.os == 'macOS'
        run: |
          app_dir="$(./package-macos.sh)"
          test -x "$app_dir/Contents/MacOS/Motional"
          test -f "$app_dir/Contents/Resources/Motional.icns"
          test -f "$app_dir/Contents/PkgInfo"
          plutil -lint "$app_dir/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_dir/Contents/Info.plist" | grep -Fx Motional
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: motional-clients-${{ runner.os }}
          path: |
            apps/motional-lock/target/release/motional-gui
            apps/motional-lock/target/release/motional-gui.exe
            apps/motional-lock/target/release/bundle/macos/Motional.app/**
            apps/motional-lock/target/release/motional-cli
            apps/motional-lock/target/release/motional-cli.exe
          if-no-files-found: ignore
